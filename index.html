<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr & Wetter</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: black;
            color: white;
            font-family: "Outfit", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .clock {
            font-size: 15vw;
            font-weight: 600;
        }

        .date {
            font-size: 4vw;
            font-weight: 600;
        }

        .weather {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div id="weather" class="weather">Wetter lädt...</div>

<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<script>
function updateTime() {
    const now = new Date();

    const timeFormatter = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Europe/Vienna',
        hour: '2-digit',
        minute: '2-digit'
    });

    const dateFormatter = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Europe/Vienna',
        weekday: 'long',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
    });

    document.getElementById('clock').textContent = timeFormatter.format(now);
    document.getElementById('date').textContent = dateFormatter.format(now);
}

async function updateWeather() {
    const weatherElement = document.getElementById('weather');

    try {
        const response = await fetch(
            'https://api.open-meteo.com/v1/forecast?latitude=48.2194&longitude=14.4178&current=temperature_2m,weather_code&timezone=Europe%2FVienna'
        );

        const data = await response.json();

        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;

        // Icons + Beschreibung
        const weatherMap = {
            0: ['☀️', 'Klar'],
            1: ['🌤️', 'Überwiegennnd klar'],
            2: ['⛅', 'Teilweise bewölkt'],
            3: ['☁️', 'Bewölkt'],
            45: ['🌫️', 'Nebel'],
            48: ['🌫️', 'Reifnebel'],
            51: ['🌦️', 'Nieselregen'],
            61: ['🌧️', 'Regen'],
            63: ['🌧️', 'Regen'],
            65: ['🌧️', 'Starker Regen'],
            71: ['🌨️', 'Schnee'],
            73: ['❄️', 'Schnee'],
            75: ['❄️', 'Starker Schnee'],
            80: ['🌦️', 'Regenschauer'],
            95: ['⛈️', 'Gewitter']
        };

        const [icon, text] = weatherMap[code] || ['❓', 'Unbekannt'];

        weatherElement.textContent = `${icon} ${temp}°C`;
    } catch (error) {
        weatherElement.textContent = '⚠️ Wetter nicht verfügbar';
    }
}

setInterval(updateTime, 1000);
setInterval(updateWeather, 10 * 60 * 1000);

updateTime();
updateWeather();
</script>

</body>
</html>
