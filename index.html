<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhr & Datum</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: black;
            color: white;
            font-family: "Outfit", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .clock {
            font-size: 15vw;
            font-weight: 600;
        }
        .date {
            font-size: 4vw;
            font-weight: 600;
        }

        .wlr {
            position: absolute;
            top: 15px;
            right: 20px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<!-- Wetter für Asten / Linz -->
<div id="id_weather" class="wlr"
     a='{"t":"r","v":"1.2","lang":"de","locs":[728],"ssot":"c","cbkg":"#FFFFFF00","cfnt":"rgba(255,255,255,1)","codd":"#FFFFFF00","cont":"rgba(255,255,255,0.83)","stof":"5"}'>
</div>
<script async src="https://static1.sharpweather.com/widgetjs/?id=id_weather"></script>


<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<script>
function updateTime() {
    const now = new Date();

    // Uhrzeit in Wien
    const timeFormatter = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Europe/Vienna',
        hour: '2-digit',
        minute: '2-digit'
    });

    // Datum + Wochentag in Deutsch
    const dateFormatter = new Intl.DateTimeFormat('de-DE', {
        timeZone: 'Europe/Vienna',
        weekday: 'long',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
    });

    const time = timeFormatter.format(now);
    const date = dateFormatter.format(now);

    document.getElementById('clock').textContent = time;
    document.getElementById('date').textContent = date;
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
